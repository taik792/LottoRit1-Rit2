<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #06131f;
  color: white;
  text-align: center;
}

/* ===== TITOLI ===== */
h1 {
  color: #00ffc3;
  font-size: 20px;
  margin: 10px 0;
}

.title {
  margin: 10px 0;
  color: #ccc;
  font-size: 14px;
}

/* ===== GRIGLIA FORZATA ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr) !important;
  gap: 8px;
  padding: 0 8px;
}

/* ===== CARD ===== */
.card {
  background: #0c2436;
  border: 2px solid #00ffc3;
  border-radius: 10px;
  padding: 8px;
}

.top {
  border: 2px solid gold;
  background: #2a2500;
}

.jolly {
  border: 2px solid red;
  background: #3a0000;
}

.card h3 {
  font-size: 11px;
  margin: 4px 0;
  color: #aaa;
}

.numbers {
  font-size: 16px;
  color: #00ffc3;
}

.small {
  font-size: 13px;
  color: #ccc;
}

.section {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<!-- ESTRAZIONE -->
<div class="section">
  <div class="title">🧾 ULTIMA ESTRAZIONE</div>
  <div id="estrazione" class="grid"></div>
</div>

<!-- TOP -->
<div class="section">
  <div class="title">🎯 TOP</div>
  <div id="top" class="grid"></div>
</div>

<!-- JOLLY -->
<div class="section">
  <div class="title">💣 JOLLY</div>
  <div id="jolly"></div>
</div>

<!-- RUOTE -->
<div class="section">
  <div class="title">📊 RUOTE</div>
  <div id="ruote" class="grid"></div>
</div>

<script>

// 🔥 anti-cache
const url = "risultati.json?v=" + new Date().getTime();
const urlEstr = "estrazioni.json?v=" + new Date().getTime();

// ===== RISULTATI =====
fetch(url)
.then(res => res.json())
.then(data => {

  // TOP
  const topDiv = document.getElementById("top");
  topDiv.innerHTML = "";

  if (data.top) {
    data.top.forEach(t => {
      const div = document.createElement("div");
      div.className = "card top";
      div.innerHTML = `
        <h3>${t.ruota}</h3>
        <div class="numbers">${t.ambo.join(" - ")}</div>
      `;
      topDiv.appendChild(div);
    });
  }

  // JOLLY
  const jollyDiv = document.getElementById("jolly");
  jollyDiv.innerHTML = "";

  if (data.jolly && data.jolly.ambo) {
    const div = document.createElement("div");
    div.className = "card jolly";
    div.innerHTML = `
      <h3>${data.jolly.ruota}</h3>
      <div class="numbers">${data.jolly.ambo.join(" - ")}</div>
    `;
    jollyDiv.appendChild(div);
  }

  // RUOTE
  const ruoteDiv = document.getElementById("ruote");
  ruoteDiv.innerHTML = "";

  Object.keys(data.ruote).forEach(ruota => {

    const r = data.ruote[ruota];
    if (!r || !r.ambo) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${ruota}</h3>
      <div class="numbers">${r.ambo.join(" - ")}</div>
    `;

    ruoteDiv.appendChild(div);
  });

});


// ===== ESTRAZIONI =====
fetch(urlEstr)
.then(res => res.json())
.then(data => {

  const estrDiv = document.getElementById("estrazione");
  estrDiv.innerHTML = "";

  Object.keys(data).forEach(ruota => {

    const lista = data[ruota];
    if (!lista || lista.length === 0) return;

    const ultima = lista[lista.length - 1];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${ruota}</h3>
      <div class="numbers small">${ultima.join(" - ")}</div>
    `;

    estrDiv.appendChild(div);
  });

})
.catch(err => console.log("Errore estrazioni:", err));

</script>

</body>
</html>
