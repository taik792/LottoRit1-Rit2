<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro - Motore 8</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #031f35;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #00eaff;
    font-size: 42px;
    margin-bottom: 10px;
}

h2 {
    font-size: 26px;
    margin: 30px 0 20px;
}

.sezione {
    margin-bottom: 40px;
}

.griglia {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1300px;
    margin: auto;
}

.card-top {
    background: #4b3600;
    border: 4px solid gold;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.card-jolly {
    background: #c40000;
    border: 4px solid red;
    border-radius: 20px;
    padding: 25px;
    max-width: 700px;
    margin: auto;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.card-terno {
    background: #102f4d;
    border: 4px solid #00eaff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 15px rgba(0,234,255,0.3);
}

.ruota {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

.label {
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 8px;
    color: #ffffff;
}

.numeri {
    font-size: 42px;
    font-weight: bold;
    color: #00eaff;
    margin: 15px 0;
}

.estrazione {
    font-size: 24px;
    color: #ffffff;
    margin: 10px 0;
}

.score {
    font-size: 28px;
    color: #ffc0cb;
    font-weight: bold;
    margin-top: 15px;
}

@media (max-width: 900px) {
    .griglia {
        grid-template-columns: 1fr;
    }

    .numeri {
        font-size: 34px;
    }

    h1 {
        font-size: 32px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 8</h2>

<div class="sezione">
    <h2>🎯 TOP</h2>
    <div class="griglia" id="top"></div>
</div>

<div class="sezione">
    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<div class="sezione">
    <h2>📊 TERNO FORTE</h2>
    <div class="griglia" id="terno-forte"></div>
</div>

<script>
const ordineRuote = [
    "Bari",
    "Cagliari",
    "Firenze",
    "Genova",
    "Milano",
    "Napoli",
    "Palermo",
    "Roma",
    "Torino",
    "Venezia",
    "Nazionale"
];

function formatTerno(terno) {
    return terno.join(" — ");
}

function formatEstrazione(estrazione) {
    return estrazione.join(" • ");
}

function getUltimaEstrazione(estrazioni, ruota) {
    if (!estrazioni[ruota] || estrazioni[ruota].length === 0) {
        return [];
    }

    return estrazioni[ruota][estrazioni[ruota].length - 1];
}

function creaCardTop(item) {
    return `
        <div class="card-top">
            <div class="ruota">${item.ruota}</div>
            <div class="numeri">${formatTerno(item.terno)}</div>
            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

function creaCardJolly(item) {
    return `
        <div class="card-jolly">
            <div class="ruota">${item.ruota}</div>
            <div class="numeri">${formatTerno(item.terno)}</div>
            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

function creaCardTerno(item, ultimaEstrazione) {
    return `
        <div class="card-terno">
            <div class="ruota">${item.ruota}</div>

            <div class="label">Ultima Estrazione</div>
            <div class="estrazione">${formatEstrazione(ultimaEstrazione)}</div>

            <div class="label">Terno Forte</div>
            <div class="numeri">${formatTerno(item.terno)}</div>

            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

async function caricaDati() {
    try {
        const risultatiRes = await fetch("risultati.json");
        const risultati = await risultatiRes.json();

        const estrazioniRes = await fetch("estrazioni.json");
        const estrazioni = await estrazioniRes.json();

        document.getElementById("top").innerHTML =
            risultati.top.map(creaCardTop).join("");

        document.getElementById("jolly").innerHTML =
            creaCardJolly(risultati.jolly);

        const ordinati = risultati.terno_forte.sort((a, b) => {
            return ordineRuote.indexOf(a.ruota) - ordineRuote.indexOf(b.ruota);
        });

        document.getElementById("terno-forte").innerHTML =
            ordinati.map(item => {
                const ultima = getUltimaEstrazione(estrazioni, item.ruota);
                return creaCardTerno(item, ultima);
            }).join("");

    } catch (errore) {
        console.error("Errore caricamento dati:", errore);
    }
}

caricaDati();
</script>

</body>
</html>
