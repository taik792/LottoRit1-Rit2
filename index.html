<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro - Motore 8</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #031f33;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    color: #00eaff;
    font-size: 42px;
    margin-top: 30px;
    margin-bottom: 10px;
}

h2 {
    font-size: 24px;
    margin: 30px 0 20px;
}

.section-title {
    font-size: 42px;
    font-weight: bold;
    margin-top: 30px;
    margin-bottom: 20px;
}

.grid-top {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.grid-terno {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.card-top {
    background: #3b2a00;
    border: 4px solid #ffd700;
    border-radius: 25px;
    padding: 25px;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.card-jolly {
    background: #c40000;
    border: 4px solid #ff2a2a;
    border-radius: 25px;
    padding: 30px;
    margin: 30px auto;
    max-width: 700px;
}

.card-terno {
    background: #0d2d4a;
    border: 4px solid #00eaff;
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,234,255,0.2);
}

.ruota {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

.estrazione {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 20px;
}

.numeri {
    font-size: 28px;
    font-weight: bold;
    color: #00eaff;
    margin: 20px 0;
}

.score {
    font-size: 18px;
    color: #ffc0cb;
    font-weight: bold;
}

@media(max-width: 768px) {
    .grid-top,
    .grid-terno {
        grid-template-columns: 1fr;
        padding: 15px;
    }

    .numeri {
        font-size: 24px;
    }

    h1 {
        font-size: 34px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<div class="section-title">Motore 8</div>

<div class="section-title">🎯 TOP</div>
<div id="top" class="grid-top"></div>

<div class="section-title">💣 JOLLY</div>
<div id="jolly"></div>

<div class="section-title">📊 TERNO FORTE</div>
<div id="terno" class="grid-terno"></div>

<script>
async function caricaDati() {
    const risultati = await fetch("risultati.json").then(r => r.json());
    const estrazioni = await fetch("../estrazioni.json").then(r => r.json());

    const ordineRuote = [
        "Bari",
        "Cagliari",
        "Firenze",
        "Genova",
        "Milano",
        "Napoli",
        "Palermo",
        "Roma",
        "Torino",
        "Venezia"
    ];

    // prende l'ultima estrazione (ultima riga del json)
    const ultimaEstrazione = estrazioni[estrazioni.length - 1];

    const topDiv = document.getElementById("top");
    const jollyDiv = document.getElementById("jolly");
    const ternoDiv = document.getElementById("terno");

    // TOP
    risultati.top.forEach(item => {
        topDiv.innerHTML += `
            <div class="card-top">
                <div class="ruota">${item.ruota}</div>
                <div class="numeri">
                    ${item.terno.join(" — ")}
                </div>
                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

    // JOLLY
    if (risultati.jolly) {
        jollyDiv.innerHTML = `
            <div class="card-jolly">
                <div class="ruota">${risultati.jolly.ruota}</div>
                <div class="numeri">
                    ${risultti.jolly.terno.join(" — ")}
                </div>
            </div>
        `;
    }

    // TERNO FORTE ordinato
    ordineRuote.forEach(ruota => {
        const pronostico = risultati.terno_forte.find(x => x.ruota === ruota);

        if (!pronostico) return;

        const estrazioneRuota = ultimaEstrazione[ruota] || [];

        ternoDiv.innerHTML += `
            <div class="card-terno">
                <div class="ruota">${ruota}</div>

                <div class="estrazione">
                    Ultima Estrazione<br>
                    ${estrazioneRuota.join(" • ")}
                </div>

                <div class="numeri">
                    ${pronostico.terno.join(" — ")}
                </div>

                <div class="score">
                    Score: ${pronostico.score}
                </div>
            </div>
        `;
    });
}

caricaDati();
</script>

</body>
</html>
