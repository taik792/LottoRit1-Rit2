<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  console.log("DATI:", data); // DEBUG

  // ===== TOP =====
  const topDiv = document.getElementById("top");
  if (topDiv) {
    topDiv.innerHTML = "";

    if (data.top) {
      data.top.forEach(g => {
        const el = document.createElement("div");
        el.innerHTML = `${g.ruota} → ${g.ambo?.join(" - ") || ""}`;
        topDiv.appendChild(el);
      });
    }
  }

  // ===== JOLLY =====
  const jollyDiv = document.getElementById("jolly");
  if (jollyDiv && data.jolly && data.jolly.ambo) {
    jollyDiv.innerHTML = `
      ${data.jolly.ruota} → ${data.jolly.ambo.join(" - ")}
    `;
  }

  // ===== RUOTE =====
  const container = document.getElementById("giocate");
  if (container && data.ruote) {
    container.innerHTML = "";

    Object.keys(data.ruote).forEach(ruota => {
      const r = data.ruote[ruota];

      if (!r || !r.ambo) return;

      const el = document.createElement("div");
      el.innerHTML = `
        ${ruota} → ${r.ambo.join(" - ")}
      `;

      container.appendChild(el);
    });
  }

})
.catch(err => {
  document.body.innerHTML = "<h2 style='color:red'>Errore caricamento dati</h2>";
  console.error(err);
});
</script>
