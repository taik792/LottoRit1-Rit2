<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro - Motore 8</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #041f33;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    color: #00eaff;
    font-size: 42px;
    margin-top: 30px;
    margin-bottom: 10px;
}

h2 {
    font-size: 42px;
    margin: 30px 0 20px;
    font-weight: bold;
}

.section {
    margin-top: 40px;
}

.grid-top {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.grid-terno {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.card-top {
    background: #3a2b00;
    border: 4px solid #ffd700;
    border-radius: 25px;
    padding: 25px;
}

.card-jolly {
    background: #c40000;
    border: 4px solid #ff2a2a;
    border-radius: 25px;
    padding: 30px;
    max-width: 700px;
    margin: auto;
}

.card-terno {
    background: #0d2d4a;
    border: 4px solid #00eaff;
    border-radius: 25px;
    padding: 20px;
}

.ruota {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 15px;
}

.estrazione {
    font-size: 18px;
    margin-bottom: 20px;
    line-height: 1.6;
}

.numeri {
    font-size: 30px;
    font-weight: bold;
    color: #00eaff;
    margin: 20px 0;
}

.score {
    color: #ffc0cb;
    font-size: 20px;
    font-weight: bold;
}

@media(max-width: 768px) {
    .grid-top,
    .grid-terno {
        grid-template-columns: 1fr;
    }

    .numeri {
        font-size: 24px;
    }

    h1 {
        font-size: 34px;
    }

    h2 {
        font-size: 32px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 8</h2>

<div class="section">
    <h2>🎯 TOP</h2>
    <div id="top" class="grid-top"></div>
</div>

<div class="section">
    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<div class="section">
    <h2>📊 TERNO FORTE</h2>
    <div id="terno" class="grid-terno"></div>
</div>

<script>
async function caricaDati() {
    try {
        // risultati del motore
        const risultati = await fetch("./risultati.json")
            .then(res => res.json());

        // estrazioni dalla root del repository
        const estrazioni = await fetch("./estrazioni.json")
            .then(res => res.json());

        const ordineRuote = [
            "Bari",
            "Cagliari",
            "Firenze",
            "Genova",
            "Milano",
            "Napoli",
            "Palermo",
            "Roma",
            "Torino",
            "Venezia"
        ];

        // prende l'ULTIMA estrazione (ultima riga json)
        const ultimaEstrazione = estrazioni[estrazioni.length - 1];

        const topDiv = document.getElementById("top");
        const jollyDiv = document.getElementById("jolly");
        const ternoDiv = document.getElementById("terno");

        // =========================
        // TOP
        // =========================
        risultati.top.forEach(item => {
            topDiv.innerHTML += `
                <div class="card-top">
                    <div class="ruota">${item.ruota}</div>

                    <div class="numeri">
                        ${item.terno.join(" — ")}
                    </div>

                    <div class="score">
                        Score: ${item.score}
                    </div>
                </div>
            `;
        });

        // =========================
        // JOLLY
        // =========================
        if (risultati.jolly) {
            jollyDiv.innerHTML = `
                <div class="card-jolly">
                    <div class="ruota">${risultati.jolly.ruota}</div>

                    <div class="numeri">
                        ${risultati.jolly.terno.join(" — ")}
                    </div>
                </div>
            `;
        }

        // =========================
        // TERNO FORTE
        // =========================
        ordineRuote.forEach(ruota => {
            const pronostico = risultati.terno_forte.find(
                item => item.ruota === ruota
            );

            if (!pronostico) return;

            const estrazioneRuota = ultimaEstrazione[ruota] || [];

            ternoDiv.innerHTML += `
                <div class="card-terno">
                    <div class="ruota">${ruota}</div>

                    <div class="estrazione">
                        Ultima Estrazione<br>
                        ${estrazioneRuota.join(" • ")}
                    </div>

                    <div class="numeri">
                        ${pronostico.terno.join(" — ")}
                    </div>

                    <div class="score">
                        Score: ${pronostico.score}
                    </div>
                </div>
            `;
        });

    } catch (errore) {
        console.error("Errore caricamento dati:", errore);
    }
}

caricaDati();
</script>

</body>
</html>
