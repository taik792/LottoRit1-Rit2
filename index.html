<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro - Motore 8</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #031f35;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #00eaff;
    font-size: 40px;
    margin-bottom: 10px;
}

h2 {
    margin: 30px 0 20px;
    font-size: 30px;
}

.griglia {
    display: grid;
    grid-template-columns: repeat(3, minmax(250px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: auto;
}

.card-top {
    background: #4a3500;
    border: 3px solid gold;
    border-radius: 20px;
    padding: 20px;
}

.card-jolly {
    background: #c40000;
    border: 3px solid #ff0000;
    border-radius: 20px;
    padding: 25px;
    max-width: 700px;
    margin: auto;
}

.card-terno {
    background: #10304f;
    border: 3px solid #00eaff;
    border-radius: 20px;
    padding: 20px;
}

.ruota {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

.label {
    font-size: 18px;
    margin: 10px 0;
}

.numeri {
    font-size: 38px;
    font-weight: bold;
    color: #00eaff;
    margin: 15px 0;
}

.estrazione {
    font-size: 22px;
    margin: 10px 0;
}

.score {
    font-size: 26px;
    color: #ffc0cb;
    font-weight: bold;
    margin-top: 15px;
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 8</h2>

<h2>🎯 TOP</h2>
<div class="griglia" id="top"></div>

<h2>💣 JOLLY</h2>
<div id="jolly"></div>

<h2>📊 TERNO FORTE</h2>
<div class="griglia" id="terno-forte"></div>

<script>
const ordineRuote = [
    "Bari",
    "Cagliari",
    "Firenze",
    "Genova",
    "Milano",
    "Napoli",
    "Palermo",
    "Roma",
    "Torino",
    "Venezia",
    "Nazionale"
];

function formatTerno(arr) {
    if (!arr || !Array.isArray(arr)) return "---";
    return arr.join(" — ");
}

function formatEstrazione(arr) {
    if (!arr || !Array.isArray(arr)) return "---";
    return arr.join(" • ");
}

function ultimaEstrazione(estrazioni, ruota) {
    if (!estrazioni[ruota]) return [];
    const lista = estrazioni[ruota];
    if (!lista.length) return [];
    return lista[lista.length - 1];
}

function cardTop(item) {
    return `
        <div class="card-top">
            <div class="ruota">${item.ruota}</div>
            <div class="numeri">${formatTerno(item.terno)}</div>
            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

function cardJolly(item) {
    return `
        <div class="card-jolly">
            <div class="ruota">${item.ruota}</div>
            <div class="numeri">${formatTerno(item.terno)}</div>
            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

function cardTerno(item, ultima) {
    return `
        <div class="card-terno">
            <div class="ruota">${item.ruota}</div>

            <div class="label">Ultima Estrazione</div>
            <div class="estrazione">${formatEstrazione(ultima)}</div>

            <div class="label">Terno Forte</div>
            <div class="numeri">${formatTerno(item.terno)}</div>

            <div class="score">Score: ${item.score}</div>
        </div>
    `;
}

async function carica() {
    try {
        const r1 = await fetch("risultati.json");
        const risultati = await r1.json();

        const r2 = await fetch("estrazioni.json");
        const estrazioni = await r2.json();

        document.getElementById("top").innerHTML =
            (risultati.top || []).map(cardTop).join("");

        let jollyData = risultati.jolly;

        if (Array.isArray(jollyData)) {
            jollyData = jollyData[0];
        }

        if (jollyData) {
            document.getElementById("jolly").innerHTML =
                cardJolly(jollyData);
        }

        let terno = risultati.terno_forte || [];

        terno.sort((a, b) =>
            ordineRuote.indexOf(a.ruota) - ordineRuote.indexOf(b.ruota)
        );

        document.getElementById("terno-forte").innerHTML =
            terno.map(item =>
                cardTerno(item, ultimaEstrazione(estrazioni, item.ruota))
            ).join("");

    } catch (e) {
        console.error("Errore:", e);
    }
}

carica();
</script>

</body>
</html>
