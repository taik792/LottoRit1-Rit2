<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite PRO - Motore 8</title>

<style>
body {
    margin: 0;
    background: #031b2f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #00eaff;
    margin-top: 30px;
    font-size: 42px;
}

h2 {
    margin-top: 40px;
    font-size: 38px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: #0d2f4f;
    border: 4px solid #00f0ff;
    border-radius: 28px;
    padding: 20px;
    box-shadow: 0 0 18px rgba(0,255,255,0.4);
}

.top-card {
    background: #3b2a00;
    border-color: gold;
}

.jolly-card {
    background: #8b0000;
    border-color: red;
}

.numeri {
    font-size: 42px;
    color: #00f0ff;
    font-weight: bold;
    margin: 20px 0;
}

.score {
    color: pink;
    font-size: 26px;
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 8</h2>

<div id="app"></div>
</html>
