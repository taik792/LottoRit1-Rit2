<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #031b2f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #00f7ff;
    font-size: 42px;
    margin-bottom: 10px;
}

h2 {
    color: white;
    margin-top: 40px;
    margin-bottom: 20px;
    font-size: 34px;
}

.sub {
    color: #00f7ff;
    font-size: 24px;
    margin-bottom: 30px;
    font-weight: bold;
}

.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
}

.ambo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card-top {
    background: #3a2b00;
    border: 4px solid #ffd700;
    border-radius: 22px;
    padding: 25px;
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
}

.card-jolly {
    background: #8b0000;
    border: 4px solid red;
    border-radius: 22px;
    padding: 35px;
    margin-bottom: 50px;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.card-ambo {
    background: #0a2a45;
    border: 4px solid #00f7ff;
    border-radius: 22px;
    padding: 25px;
    box-shadow: 0 0 20px rgba(0,247,255,0.25);
}

.ruota {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 15px;
}

.numeri {
    font-size: 42px;
    color: #00f7ff;
    font-weight: bold;
    margin: 15px 0;
}

.label {
    font-size: 24px;
    font-weight: bold;
    margin-top: 15px;
}

.estrazione {
    font-size: 24px;
    line-height: 1.6;
    margin: 10px 0;
}

.score {
    color: #ff9ea3;
    font-size: 28px;
    font-weight: bold;
    margin-top: 15px;
}

@media(max-width: 900px) {
    .top-grid,
    .ambo-grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 34px;
    }

    .numeri {
        font-size: 34px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<div class="sub">motore definitivo PRO</div>

<h2>🎯 TOP</h2>
<div class="top-grid" id="top"></div>

<h2>💣 JOLLY</h2>
<div id="jolly"></div>

<h2>📊 RUOTE AMBO FORTE</h2>
<div class="ambo-grid" id="ambo"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // TOP 3
    const topDiv = document.getElementById("top");
    data.top.forEach(item => {
        topDiv.innerHTML += `
            <div class="card-top">
                <div class="ruota">${item.ruota}</div>
                <div class="numeri">${item.numeri.join(" — ")}</div>
            </div>
        `;
    });

    // JOLLY
    const jollyDiv = document.getElementById("jolly");
    jollyDiv.innerHTML = `
        <div class="card-jolly">
            <div class="ruota">${data.jolly.ruota}</div>
            <div class="numeri">${data.jolly.numeri.join(" — ")}</div>
        </div>
    `;

    // AMBO FORTE TUTTE LE RUOTE
    const amboDiv = document.getElementById("ambo");

    data.ambo_forte.forEach(item => {
        amboDiv.innerHTML += `
            <div class="card-ambo">
                <div class="ruota">${item.ruota}</div>

                <div class="label">Ultima Estrazione</div>
                <div class="estrazione">
                    ${item.ultima_estrazione.join(" • ")}
                </div>

                <div class="label">Ambo Forte</div>
                <div class="numeri">
                    ${item.numeri.join(" — ")}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

});
</script>

</body>
</html>
