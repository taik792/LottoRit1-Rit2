<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>

/* ===== BASE ===== */
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#06121f;
    color:white;
    text-align:center;
    max-width:900px;
    margin:auto;
}

/* ===== TITOLI ===== */
h1 {
    color:#00ffc3;
    margin:20px 0;
    font-size:32px;
}

@media (min-width:601px){
    h1 {
        font-size:40px;
    }
}

h2 {
    margin-top:30px;
}

/* ===== GRIGLIE ===== */
.grid,
.top-container,
.estrazione {
    display:grid;
    gap:12px;
    padding:10px;
}

/* 📱 MOBILE */
@media (max-width:600px){
    .grid,
    .top-container,
    .estrazione {
        grid-template-columns: repeat(3,1fr);
    }
}

/* 💻 PC */
@media (min-width:601px){
    .grid,
    .top-container,
    .estrazione {
        grid-template-columns: repeat(4,1fr);
    }
}

/* ===== CARD ===== */
.card {
    border:2px solid #00ffc3;
    border-radius:12px;
    padding:10px;
    background:#0c1f33;
}

/* ===== TOP EVIDENZIATI ===== */
.top-card {
    border:2px solid gold;
    box-shadow:0 0 10px gold;
    background:#2a2200;
}

/* ===== TESTO ===== */
.ruota {
    font-size:14px;
    opacity:0.8;
}

.ambo {
    font-size:20px;
    color:#00ffc3;
    font-weight:bold;
}

/* ===== TOP ===== */
.top-box {
    border:2px solid gold;
    border-radius:12px;
    padding:10px;
    background:#2a2200;
    color:#00ffc3;
}

/* ===== JOLLY ===== */
.jolly-box {
    margin:20px;
    padding:15px;
    border:2px solid red;
    border-radius:12px;
    background:#330000;
    color:#00ffc3;
    font-size:20px;
}

/* ===== ESTRAZIONE ===== */
.estrazione-card {
    border:2px solid #00ffc3;
    border-radius:12px;
    padding:10px;
    background:#0c1f33;
    font-size:14px;
}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO motore3</h1>

<h2>🧾 ULTIMA ESTRAZIONE</h2>
<div id="estrazione" class="estrazione"></div>

<h2>🎯 TOP</h2>
<div id="top" class="top-container"></div>

<h2>💣 JOLLY</h2>
<div id="jolly"></div>

<h2>📊 RUOTE ambo forte</h2>
<div id="ruote" class="grid"></div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const ruoteDiv = document.getElementById("ruote");
    const topDiv = document.getElementById("top");
    const estrDiv = document.getElementById("estrazione");

    const topRuote = data.top.map(t => t.ruota);

    // ===== RUOTE =====
    Object.keys(data.ruote).forEach(ruota => {

        const dati = data.ruote[ruota];
        const isTop = topRuote.includes(ruota);

        const div = document.createElement("div");
        div.className = "card " + (isTop ? "top-card" : "");

        div.innerHTML = `
            <div class="ruota">${ruota}</div>
            <div class="ambo">${dati.ambo.join(" - ")}</div>
        `;

        ruoteDiv.appendChild(div);
    });

    // ===== TOP =====
    data.top.forEach(t => {
        const el = document.createElement("div");
        el.className = "top-box";
        el.innerHTML = `
            <div>${t.ruota}</div>
            <strong>${t.ambo.join(" - ")}</strong>
        `;
        topDiv.appendChild(el);
    });

    // ===== JOLLY =====
    const j = data.jolly;
    document.getElementById("jolly").innerHTML = `
        <div class="jolly-box">
            ${j.ruota}<br>
            <strong>${j.ambo.join(" - ")}</strong>
        </div>
    `;

    // ===== ESTRAZIONE =====
    fetch("estrazioni.json")
    .then(res => res.json())
    .then(estrazioni => {

        Object.keys(estrazioni).forEach(ruota => {

            const lista = estrazioni[ruota];
            const ultima = lista[lista.length - 1];

            const el = document.createElement("div");
            el.className = "estrazione-card";

            el.innerHTML = `
                <div>${ruota}</div>
                <strong>${ultima.join(" - ")}</strong>
            `;

            estrDiv.appendChild(el);
        });

    });

});

</script>

</body>
</html>
