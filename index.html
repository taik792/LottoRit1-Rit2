<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #031b2f;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
}

h1 {
    color: #00f7ff;
    font-size: 42px;
    margin-bottom: 10px;
}

.sub {
    color: #00f7ff;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 40px;
}

.section-title {
    font-size: 34px;
    margin: 35px 0 20px;
    font-weight: bold;
}

/* TOP */
.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 35px;
}

.top-card {
    background: #3a2b00;
    border: 4px solid #ffd700;
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 0 18px rgba(255,215,0,0.30);
}

.top-card .ruota {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
}

/* JOLLY */
.jolly-box {
    background: #8b0000;
    border: 4px solid red;
    border-radius: 24px;
    padding: 30px;
    margin-bottom: 40px;
    box-shadow: 0 0 20px rgba(255,0,0,0.35);
}

/* AMBO FORTE */
.ambo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.ambo-card {
    background: #0a2a45;
    border: 4px solid #00f7ff;
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 0 18px rgba(0,247,255,0.18);
}

.ruota {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 15px;
}

.label {
    font-size: 22px;
    font-weight: bold;
    margin-top: 14px;
    margin-bottom: 8px;
}

.estrazione {
    font-size: 22px;
    line-height: 1.5;
}

.numeri {
    font-size: 38px;
    font-weight: bold;
    color: #00f7ff;
    margin-top: 10px;
}

.score {
    font-size: 26px;
    font-weight: bold;
    color: #ff9ea3;
    margin-top: 15px;
}

/* MOBILE */
@media (max-width: 900px) {
    .top-grid,
    .ambo-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .top-card,
    .ambo-card {
        padding: 14px;
    }

    h1 {
        font-size: 34px;
    }

    .section-title {
        font-size: 28px;
    }

    .ruota {
        font-size: 20px;
    }

    .label {
        font-size: 17px;
    }

    .estrazione {
        font-size: 17px;
    }

    .numeri {
        font-size: 28px;
    }

    .score {
        font-size: 20px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<div class="sub">motore definitivo PRO</div>

<div class="section-title">🎯 TOP</div>
<div class="top-grid" id="top"></div>

<div class="section-title">💣 JOLLY</div>
<div id="jolly"></div>

<div class="section-title">📊 RUOTE AMBO FORTE</div>
<div class="ambo-grid" id="ambo"></div>

<script>
fetch("risultati.json")
.then(response => response.json())
.then(data => {

    /* TOP */
    const topDiv = document.getElementById("top");

    data.top.forEach(item => {
        topDiv.innerHTML += `
            <div class="top-card">
                <div class="ruota">${item.ruota}</div>
                <div class="numeri">${item.numeri.join(" — ")}</div>
            </div>
        `;
    });

    /* JOLLY */
    const jollyDiv = document.getElementById("jolly");

    jollyDiv.innerHTML = `
        <div class="jolly-box">
            <div class="ruota">${data.jolly.ruota}</div>
            <div class="numeri">${data.jolly.numeri.join(" — ")}</div>
        </div>
    `;

    /* AMBO FORTE */
    const amboDiv = document.getElementById("ambo");

    data.ambo_forte.forEach(item => {
        amboDiv.innerHTML += `
            <div class="ambo-card">

                <div class="ruota">${item.ruota}</div>

                <div class="label">
                    Ultima Estrazione
                </div>

                <div class="estrazione">
                    ${item.ultima_estrazione.join(" • ")}
                </div>

                <div class="label">
                    Ambo Forte
                </div>

                <div class="numeri">
                    ${item.numeri.join(" — ")}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>

            </div>
        `;
    });

})
.catch(error => {
    console.log("Errore caricamento risultati.json:", error);
});
</script>

</body>
</html>
