<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #031b2f;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    width: 95%;
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #00f7ff;
    font-size: 42px;
    margin-bottom: 10px;
}

.subtitle {
    color: #00f7ff;
    font-size: 24px;
    margin-bottom: 40px;
}

.section-title {
    font-size: 42px;
    margin: 40px 0 20px;
    font-weight: bold;
}

/* TOP */
.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.top-card {
    background: #3d2c00;
    border: 4px solid gold;
    border-radius: 24px;
    padding: 25px;
    box-shadow: 0 0 20px rgba(255,255,0,0.25);
}

.top-card h3 {
    font-size: 30px;
    margin-bottom: 15px;
}

.big-numbers {
    font-size: 42px;
    font-weight: bold;
    color: #00f7ff;
}

/* JOLLY */
.jolly-card {
    background: #8b0000;
    border: 4px solid red;
    border-radius: 24px;
    padding: 30px;
    margin-bottom: 40px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.jolly-card h3 {
    font-size: 32px;
    margin-bottom: 15px;
}

/* RUOTE */
.ruote-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.ruota-card {
    background: #082d49;
    border: 4px solid #00f7ff;
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.ruota-card h3 {
    font-size: 28px;
    margin-bottom: 15px;
}

.label {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
    margin-bottom: 8px;
}

.estrazione {
    font-size: 24px;
    line-height: 1.5;
}

.ambo {
    font-size: 38px;
    font-weight: bold;
    color: #00f7ff;
    margin-top: 10px;
}

.score {
    margin-top: 15px;
    font-size: 28px;
    color: #ff9eb0;
    font-weight: bold;
}

@media(max-width: 900px) {
    .top-grid,
    .ruote-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 600px) {
    .top-grid,
    .ruote-grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 32px;
    }

    .section-title {
        font-size: 32px;
    }

    .big-numbers,
    .ambo {
        font-size: 34px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🔥 LOTTO ELITE PRO</h1>
    <div class="subtitle">motore definitivo PRO</div>

    <div class="section-title">🎯 TOP</div>
    <div id="top" class="top-grid"></div>

    <div class="section-title">💣 JOLLY</div>
    <div id="jolly"></div>

    <div class="section-title">📊 RUOTE AMBO FORTE</div>
    <div id="ambo-forte" class="ruote-grid"></div>

</div>

<script>
fetch("risultati.json?v=" + new Date().getTime())
.then(response => response.json())
.then(data => {

    const topDiv = document.getElementById("top");
    const jollyDiv = document.getElementById("jolly");
    const amboDiv = document.getElementById("ambo-forte");

    // TOP (sempre 3 migliori)
    data.top.slice(0, 3).forEach(item => {
        topDiv.innerHTML += `
            <div class="top-card">
                <h3>${item.ruota}</h3>
                <div class="big-numbers">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    // JOLLY
    if (data.jolly.length > 0) {
        const j = data.jolly[0];

        jollyDiv.innerHTML = `
            <div class="jolly-card">
                <h3>${j.ruota}</h3>
                <div class="big-numbers">
                    ${j.numeri[0]} — ${j.numeri[1]}
                </div>
            </div>
        `;
    }

    // RUOTE AMBO FORTE
    data.ambo_forte.forEach(item => {
        amboDiv.innerHTML += `
            <div class="ruota-card">
                <h3>${item.ruota}</h3>

                <div class="label">Ultima Estrazione</div>
                <div class="estrazione">
                    ${item.ultima_estrazione.join(" • ")}
                </div>

                <div class="label">Ambo Forte</div>
                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

})
.catch(error => {
    console.error("Errore caricamento JSON:", error);
});
</script>

</body>
</html>
