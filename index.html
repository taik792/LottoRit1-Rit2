<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<style>
body {
  background: #06121f;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #00ffc3;
}

.section {
  margin-top: 25px;
}

.title {
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  border: 2px solid #00ffc3;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  background: #0c1f33;
}

.card h3 {
  margin: 5px 0;
  font-size: 14px;
  color: #aaa;
}

.numbers {
  font-size: 22px;
  font-weight: bold;
  color: #00ffc3;
}

.top-card {
  border: 2px solid gold;
  background: #1a1a00;
}

.jolly {
  border: 2px solid red;
  background: #2a0000;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<!-- TOP -->
<div class="section">
  <div class="title">🎯 TOP</div>
  <div id="top" class="grid"></div>
</div>

<!-- JOLLY -->
<div class="section">
  <div class="title">💣 JOLLY</div>
  <div id="jolly"></div>
</div>

<!-- RUOTE -->
<div class="section">
  <div class="title">📊 RUOTE</div>
  <div id="ruote" class="grid"></div>
</div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  // ===== TOP =====
  const topDiv = document.getElementById("top");

  data.top.forEach(t => {
    const div = document.createElement("div");
    div.className = "card top-card";
    div.innerHTML = `
      <h3>${t.ruota}</h3>
      <div class="numbers">${t.ambo.join(" - ")}</div>
    `;
    topDiv.appendChild(div);
  });

  // ===== JOLLY =====
  const jollyDiv = document.getElementById("jolly");

  if (data.jolly && data.jolly.ambo) {
    const div = document.createElement("div");
    div.className = "card jolly";
    div.innerHTML = `
      <h3>${data.jolly.ruota}</h3>
      <div class="numbers">${data.jolly.ambo.join(" - ")}</div>
    `;
    jollyDiv.appendChild(div);
  }

  // ===== RUOTE =====
  const ruoteDiv = document.getElementById("ruote");

  Object.keys(data.ruota).forEach(r => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${r}</h3>
      <div class="numbers">${data.ruota[r].join(" - ")}</div>
    `;
    ruoteDiv.appendChild(div);
  });

});
</script>

</body>
</html>
