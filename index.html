```
h1 {
  color: #00eaff;
  font-size: 42px;
  margin-top: 20px;
}

h2 {
  font-size: 34px;
  margin: 10px 0 30px;
}

.section-title {
  font-size: 34px;
  margin: 30px 0 20px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1300px;
  margin: auto;
  padding: 0 20px 40px;
}

.top-card {
  background: #3a2b00;
  border: 4px solid #ffd700;
  border-radius: 20px;
  padding: 20px;
}

.ruota-card {
  background: #0c2b47;
  border: 4px solid #00eaff;
  border-radius: 20px;
  padding: 20px;
}

.jolly-card {
  background: #a40000;
  border: 4px solid red;
  border-radius: 20px;
  padding: 20px;
  max-width: 700px;
  margin: 0 auto 40px;
}

h3 {
  margin: 0 0 15px;
  font-size: 28px;
}

.numbers {
  font-size: 42px;
  color: #00eaff;
  font-weight: bold;
  line-height: 1.4;
}

.score {
  margin-top: 15px;
  font-size: 28px;
  color: #ffc0cb;
  font-weight: bold;
}

.estrazione {
  font-size: 20px;
  margin: 10px 0;
  line-height: 1.6;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
```
