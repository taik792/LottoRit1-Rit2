<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO - Motore 8</title>

<style>
body {
    margin: 0;
    background: #031b2f;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    color: #00eaff;
    font-size: 42px;
    margin-top: 20px;
}

h2 {
    font-size: 34px;
    margin-bottom: 30px;
}

.section-title {
    font-size: 32px;
    margin: 30px 0 20px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1400px;
    margin: auto;
    padding: 0 20px 40px;
}

.top-card {
    background: #3a2b00;
    border: 4px solid #ffd700;
    border-radius: 20px;
    padding: 20px;
}

.ruota-card {
    background: #0c2b47;
    border: 4px solid #00eaff;
    border-radius: 20px;
    padding: 20px;
}

.jolly-card {
    background: #b30000;
    border: 4px solid red;
    border-radius: 20px;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto 40px;
}

h3 {
    margin: 0 0 10px;
    font-size: 26px;
}

.numbers {
    font-size: 34px;
    color: #00eaff;
    font-weight: bold;
    line-height: 1.5;
}

.score {
    margin-top: 12px;
    font-size: 22px;
    color: #ffc0cb;
    font-weight: bold;
}

.estrazione {
    font-size: 18px;
    margin: 15px 0;
    line-height: 1.6;
}

@media (max-width: 900px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 0 10px 30px;
    }

    .top-card,
    .ruota-card {
        padding: 10px;
        border-width: 3px;
    }

    h3 {
        font-size: 18px;
    }

    .numbers {
        font-size: 22px;
    }

    .score {
        font-size: 16px;
    }

    .estrazione {
        font-size: 13px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<h2>Motore 8</h2>

<div class="section-title">🎯 TOP</div>
<div id="top" class="grid"></div>

<div class="section-title">💣 JOLLY</div>
<div id="jolly"></div>

<div class="section-title">📊 TERNO FORTE</div>
<div id="terno-forte" class="grid"></div>

<script>
const ordineRuote = [
    "Bari",
    "Cagliari",
    "Firenze",
    "Genova",
    "Milano",
    "Napoli",
    "Palermo",
    "Roma",
    "Torino",
    "Venezia"
];

Promise.all([
    fetch("risultati.json").then(r => r.json()),
    fetch("estrazioni.json").then(r => r.json())
])
.then(([risultati, estrazioni]) => {

    // prende l'ultima estrazione (file ordinato da vecchio → nuovo)
    const ultimaEstrazione = estrazioni[estrazioni.length - 1];

    // ---------- TOP ----------
    const topDiv = document.getElementById("top");

    risultati.top
        .sort((a, b) =>
            ordineRuote.indexOf(a.ruota) - ordineRuote.indexOf(b.ruota)
        )
        .forEach(item => {
            topDiv.innerHTML += `
                <div class="top-card">
                    <h3>${item.ruota}</h3>
                    <div class="numbers">${item.terno.join(" — ")}</div>
                    <div class="score">Score: ${item.score}</div>
                </div>
            `;
        });

    // ---------- JOLLY ----------
    const jollyDiv = document.getElementById("jolly");

    jollyDiv.innerHTML = `
        <div class="jolly-card">
            <h3>${risultati.jolly.ruota}</h3>
            <div class="numbers">${risultati.jolly.terno.join(" — ")}</div>
        </div>
    `;

    // ---------- TERNO FORTE ----------
    const ternoDiv = document.getElementById("terno-forte");

    ordineRuote.forEach(ruota => {

        const pronostico = risultati.top.find(x => x.ruota === ruota);

        if (!pronostico) return;

        const estrazioneRuota = ultimaEstrazione[ruota] || [];

        ternoDiv.innerHTML += `
            <div class="ruota-card">
                <h3>${ruota}</h3>

                <div class="estrazione">
                    Ultima Estrazione<br>
                    ${estrazioneRuota.join(" • ")}
                </div>

                <div class="numbers">
                    ${pronostico.terno.join(" — ")}
                </div>

                <div class="score">
                    Score: ${pronostico.score}
                </div>
            </div>
        `;
    });

})
.catch(err => {
    console.error(err);
});
</script>

</body>
</html>
