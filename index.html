<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
  background: #0b1320;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #00ffc3;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #111c2e;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #00ffc3;
}

.top {
  border: 2px solid gold;
}

.jolly {
  border: 2px solid red;
}
</style>

</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<h2>🎯 TOP</h2>
<div id="top" class="container"></div>

<h2>💣 JOLLY</h2>
<div id="jolly" class="container"></div>

<h2>📊 RUOTE</h2>
<div id="giocate" class="container"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  console.log("DATI:", data);

  // ===== TOP =====
  const topDiv = document.getElementById("top");
  topDiv.innerHTML = "";

  if (data.top && data.top.length) {
    data.top.forEach(g => {
      const el = document.createElement("div");
      el.className = "card top";

      el.innerHTML = `
        <b>${g.ruota || "?"}</b><br>
        ${g.ambo ? g.ambo.join(" - ") : "N/A"}
      `;

      topDiv.appendChild(el);
    });
  }

  // ===== JOLLY =====
  const jollyDiv = document.getElementById("jolly");
  jollyDiv.innerHTML = "";

  if (data.jolly && data.jolly.ambo) {
    const el = document.createElement("div");
    el.className = "card jolly";

    el.innerHTML = `
      <b>${data.jolly.ruota}</b><br>
      ${data.jolly.ambo.join(" - ")}
    `;

    jollyDiv.appendChild(el);
  }

  // ===== RUOTE =====
  const container = document.getElementById("giocate");
  container.innerHTML = "";

  if (data.ruote) {
    Object.keys(data.ruote).forEach(ruota => {
      const r = data.ruote[ruota];

      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <b>${ruota}</b><br>
        ${r && r.ambo ? r.ambo.join(" - ") : "N/A"}
      `;

      container.appendChild(el);
    });
  }

})
.catch(err => {
  console.error(err);
  document.body.innerHTML = "<h2 style='color:red'>Errore caricamento dati</h2>";
});
</script>

</body>
</html>
